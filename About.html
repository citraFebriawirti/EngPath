<style>
/* ── Design tokens (shared with landing) ─────────────────────────────────── */
:root {
  --bg: #FCFCFB;
  --surface: #F7F8F7;
  --surface-2: #F1F3F1;
  --elevated: #FFFFFF;
  --text: #1E2220;
  --text-2: #66706B;
  --text-3: #9AA29D;
  --border: #E6E8E7;
  --border-2: #D6DAD8;

  --primary: #4F8EF7;
  --primary-soft: #DDEBFF;
  --on-primary: #FFFFFF;

  --success: #58B368;  --success-soft: #E7F7EA;
  --warning: #E7A93B;  --warning-soft: #FFF3DA;
  --danger:  #D96B6B;  --danger-soft:  #FCEAEA;

  --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px; --r-2xl: 28px;

  --sh-1: 0 1px 2px rgba(24,30,28,.04), 0 1px 1px rgba(24,30,28,.03);
  --sh-2: 0 2px 8px rgba(24,30,28,.05), 0 1px 2px rgba(24,30,28,.04);
  --sh-3: 0 12px 32px rgba(24,30,28,.08), 0 3px 8px rgba(24,30,28,.05);
  --sh-pop: 0 18px 48px rgba(24,30,28,.14), 0 6px 16px rgba(24,30,28,.08);

  --maxw: 1180px;
  --nav-h: 60px;
  --ease: cubic-bezier(.32,.72,.32,1);
}

html[data-theme="dark"] {
  --bg: #0D0F0E;
  --surface: #141715;
  --surface-2: #1A1E1C;
  --elevated: #181C1A;
  --text: #ECEFEC;
  --text-2: #98A29C;
  --text-3: #69716C;
  --border: #262B28;
  --border-2: #323833;
  --primary-soft: #16263D;
  --success-soft: #122318; --warning-soft: #2A2310; --danger-soft: #2C1717;
  --sh-1: 0 1px 2px rgba(0,0,0,.35);
  --sh-2: 0 2px 10px rgba(0,0,0,.4);
  --sh-3: 0 14px 36px rgba(0,0,0,.5), 0 3px 8px rgba(0,0,0,.4);
  --sh-pop: 0 20px 52px rgba(0,0,0,.62), 0 6px 16px rgba(0,0,0,.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background .4s var(--ease), color .4s var(--ease);
  overflow-x: hidden;
}

::selection { background: var(--primary-soft); color: var(--text); }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

.wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
.eyebrow {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase; color: var(--text-3);
  display: inline-flex; align-items: center; gap: 8px;
}
.eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--border-2); }
.section-title { font-size: clamp(26px, 3.4vw, 40px); font-weight: 600; letter-spacing: -.02em; line-height: 1.08; text-wrap: balance; }
.section-sub { color: var(--text-2); font-size: clamp(15px, 1.6vw, 17px); max-width: 46ch; text-wrap: pretty; line-height: 1.6; }

:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

.reveal { opacity: 0; transform: translateY(18px); transition: opacity .6s var(--ease), transform .6s var(--ease); }
.reveal.in { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce) { .reveal { opacity: 1 !important; transform: none !important; transition: none; } }

#root { min-height: 100vh; }
.boot { display: grid; place-items: center; min-height: 100vh; color: var(--text-3); font-family: var(--font-mono); font-size: 13px; }
</style>
</head>
